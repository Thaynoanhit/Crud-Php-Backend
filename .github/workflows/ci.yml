name: CI Backend PHP

on:
  push:
    branches:
      - main
      - develop
      - master
  pull_request:

permissions:
  contents: read

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          tools: composer:v2
          coverage: none

      - name: Validate composer.json
        run: composer validate --strict

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Start local PHP server for integration tests
        run: |
          nohup php -S 127.0.0.1:8000 public/index.php >/tmp/php-server.log 2>&1 &
          sleep 2

      - name: Run PHPUnit
        env:
          API_TEST_BASE_URL: http://127.0.0.1:8000
        run: vendor/bin/phpunit

      - name: Show server log on failure
        if: failure()
        run: cat /tmp/php-server.log
